version: 2
updates:
  - package-ecosystem: nuget
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    labels:
      - dependencies
    commit-message:
      prefix: deps
    groups:
      microsoft-extensions:
        patterns:
          - "Microsoft.Extensions.*"
      xunit:
        patterns:
          - "xunit*"
      sourcelink:
        patterns:
          - "Microsoft.SourceLink.*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: ci
